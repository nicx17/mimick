app-id: io.github.nicx17.mimick
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: mimick

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/mimick/cargo

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --env=GSK_RENDERER=gl
  - --share=ipc
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=org.kde.*
  - --share=network
  # Folder access is granted per-directory via the file chooser portal

modules:
  - name: mimick
    buildsystem: simple
    build-commands:
      - mv cargo/config cargo/config.toml
      - cargo --offline build --release
      - install -Dm755 target/release/mimick /app/bin/mimick
      - install -Dm644 setup/io.github.nicx17.mimick.desktop /app/share/applications/io.github.nicx17.mimick.desktop
      - install -Dm644 src/assets/icon.svg /app/share/icons/hicolor/scalable/apps/io.github.nicx17.mimick.svg
      - install -Dm644 setup/metainfo/io.github.nicx17.mimick.metainfo.xml /app/share/metainfo/io.github.nicx17.mimick.metainfo.xml
    sources:
      - type: dir
        path: .
        skip:
          - .git
          - build-dir
          - target
      - cargo-sources.json
